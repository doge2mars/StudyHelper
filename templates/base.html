<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=3.0.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #FFFFFF;
            --card: #F7F7F7;
            --text: #4B4B4B;
            --primary: #1CB0F6;
            --accent: #58CC02;
            --success: #58CC02;
            --danger: #FF4B4B;
            --glass: blur(10px);
            --grade-badge: rgba(28, 176, 246, 0.15);
        }

        body.dark {
            --bg: #131415;
            --card: #202225;
            --text: #f1f2f6;
            --primary: #1CB0F6;
            --accent: #58CC02;
            --grade-badge: rgba(28, 176, 246, 0.2);
        }

        * {
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, sans-serif;
            transition: background 0.2s, color 0.2s;
        }

        body {
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar UI */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 256px;
            background-color: var(--card);
            border-right: 2px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            box-sizing: border-box;
            z-index: 100;
        }

        .sidebar-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 1.05rem;
            border-radius: 12px;
            transition: all 0.2s;
            border: 2px solid transparent;
            opacity: 0.7;
        }

        body.dark .nav-item {
            opacity: 0.9;
        }

        .nav-item i {
            font-size: 1.4rem;
            width: 28px;
            text-align: center;
        }

        .nav-item:hover {
            background-color: rgba(28, 176, 246, 0.05);
            color: var(--primary);
            opacity: 1;
        }

        .nav-item.active {
            background-color: rgba(28, 176, 246, 0.1);
            color: var(--primary);
            border-color: rgba(28, 176, 246, 0.2);
            opacity: 1;
        }

        .main-content {
            flex: 1;
            margin-left: 256px;
            padding: 1rem 2rem;
            min-height: 100vh;
            box-sizing: border-box;
            max-width: 1400px;
        }

        .container {
            width: 100%;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: var(--glass);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .btn {
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            font-size: 0.95rem;
            background: var(--card);
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 0 #1899d6;
        }

        .btn-icon {
            background: none;
            padding: 0.5rem;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            opacity: 0.8;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        .q-image {
            max-width: 100%;
            border-radius: 15px;
            margin: 1rem 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .opt-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .opt {
            padding: 1rem 1.2rem;
            border-radius: 16px;
            border: 2px solid var(--border-color, #e5e5e5);
            border-bottom: 4px solid var(--border-color, #e5e5e5);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--card);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 500;
        }

        .opt:hover {
            border-color: var(--primary, #1CB0F6);
            background: rgba(28, 176, 246, 0.05);
        }

        .opt:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
            margin-bottom: 2px;
        }

        .opt.correct {
            background: rgba(88, 167, 0, 0.1);
            color: var(--success, #58a700);
            border-color: var(--success, #58a700);
        }

        .opt.wrong {
            background: rgba(234, 43, 43, 0.1);
            color: var(--danger, #ea2b2b);
            border-color: var(--danger, #ea2b2b);
        }

        .badge {
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .grade-badge {
            display: inline-block;
            background: var(--grade-badge);
            color: var(--accent);
            padding: 0.1rem 0.4rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.4rem;
            vertical-align: middle;
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .grade-selector {
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            font-size: 0.85rem;
            color: var(--text);
            transition: all 0.2s;
        }

        body.dark .grade-selector {
            background: rgba(30, 39, 46, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f2f6;
        }

        .grade-selector:hover {
            border-color: var(--accent);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes pop {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        /* V2.0: Mobile Responsive Sidebar (LingoDeep Style) */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: 70px;
                position: fixed;
                left: 0;
                top: auto;
                bottom: 0;
                border-right: none;
                border-top: 2px solid var(--border-color);
                flex-direction: row;
                padding: 0;
                justify-content: space-around;
                align-items: center;
                background: var(--bg);
            }

            .sidebar-logo {
                display: none;
            }

            .sidebar-nav {
                flex-direction: row !important;
                margin-top: 0 !important;
                gap: 0 !important;
                width: 100%;
                justify-content: space-around;
            }

            .sidebar-footer {
                display: none;
            }

            .nav-item {
                flex-direction: column;
                gap: 4px;
                padding: 0.5rem;
                font-size: 0.75rem;
                border: none !important;
                background: transparent !important;
            }

            .nav-item i {
                font-size: 1.4rem;
            }

            .nav-item.active {
                color: var(--primary);
                background: transparent !important;
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
                padding-bottom: 90px;
            }
        }
    </style>
    <!-- MathJax for LaTeX Rendering -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
        </script>
</head>

<body class="{% if request.cookies.get('theme') == 'dark' %}dark{% endif %}">
    <!-- LEFT SIDEBAR -->

        </a>

                    class="fas fa-users-cog"></i> <span>管理员</span></a>

            <hr style="border:none; border-top:2px solid rgba(0,0,0,0.05); margin: 1.5rem 0;">

            <select class="grade-selector" onchange="changeGrade(this.value)"

                    %}>🎒 一年级下</option>

                    %}>🎒 二年级上</option>
                <option value="二年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='二年级下' %}selected{% endif
                    %}>🎒 二年级下</option>

                <option value="三年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='三年级下' %}selected{% endif

                    %}>🎒 四年级下</option>

                    %}>🎒 五年级上</option>
                <option value="五年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='五年级下' %}selected{% endif
                    %}>🎒 五年级下</option>
                <option value="六年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级上' %}selected{% endif
                    %}>🎒 六年级上</option>
                <option value="六年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级下' %}selected{% endif
                    %}>🎒 六年级下</option>
                <option value="初一上" {% if unquote(request.cookies.get('active_grade', '' ))=='初一上' %}selected{% endif
                    %}>📚 初一上</option>
                <option value="初一下" {% if unquote(request.cookies.get('active_grade', '' ))=='初一下' %}selected{% endif
                    %}>📚 初一下</option>
                <option value="初二上" {% if unquote(request.cookies.get('active_grade', '' ))=='初二上' %}selected{% endif
                    %}>📚 初二上</option>
                <option value="初二下" {% if unquote(request.cookies.get('active_grade', '' ))=='初二下' %}selected{% endif
                    %}>📚 初二下</option>
                <option value="初三上" {% if unquote(request.cookies.get('active_grade', '' ))=='初三上' %}selected{% endif
                    %}>🔥 初三上</option>
                <option value="初三下" {% if unquote(request.cookies.get('active_grade', '' ))=='初三下' %}selected{% endif
                    %}>🔥 初三下</option>

                    %}>📘 高一上</option>

                    %}>📘 高一下</option>

                    %}>📘 高二上</option>
                <option value="高二下" {% if unquote(request.cookies.get('active_grade', '' ))=='高二下' %}selected{% endif
                    %}>📘 高二下</option>
                <option value="高三上" {% if unquote(request.cookies.get('active_grade', '' ))=='高三上' %}selected{% endif
                    %}>🚀 高三上</option>

                    %}>🚀 高三下</option>
            </select>
        </div>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 2px solid rgba(0,0,0,0.05);">
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <a href="/settings" class="nav-item" id="nav-settings" title="设置" style="padding:0.6rem;">
                    <i class="fas fa-cog"></i>
                </a>
                <button class="nav-item" style="border:none; background:none; cursor:pointer; padding:0.6rem;"
                    onclick="toggleTheme()" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
                {% if user %}
                <a href="/logout" class="nav-item" style="color: var(--danger); padding:0.6rem;" title="退出登录">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
                {% endif %}
            </div>
            {% if user %}
            <div style="text-align:center; font-size:0.9rem; margin-top:0.8rem; font-weight:700; color: var(--text);">
                {{ user.username }}
            </div>
            {% endif %}
            <div style="font-size: 0.75rem; opacity: 0.5; text-align: center; margin-top: 5px; font-weight: 600;">
                v{{ APP_VERSION }}
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <div id="toast"></div>
    <script>
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark');
            document.cookie = `theme=${body.classList.contains('dark') ? 'dark' : 'light'};path=/;max-age=31536000`;
        }
        function changeGrade(grade) {
            document.cookie = `active_grade=${encodeURIComponent(grade)};path=/;max-age=31536000`;
            window.location.reload();
        }
        function showToast(msg, ok = true) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background = ok ? '#00b894' : '#d63031';
            t.className = 'show';
            setTimeout(() => { t.className = t.className.replace('show', ''); }, 3000);
        }

        // --- LingoDeep Navigation Active Logic ---
        document.addEventListener('DOMContentLoaded', () => {
            const path = window.location.pathname;
            if (path === '/' || path.startsWith('/subject')) { document.getElementById('nav-index')?.classList.add('active'); }
            else if (path.startsWith('/papers')) { document.getElementById('nav-papers')?.classList.add('active'); }
            else if (path.startsWith('/paper-entry')) { document.getElementById('nav-paper-entry')?.classList.add('active'); }
            else if (path.startsWith('/slicer')) { document.getElementById('nav-slicer')?.classList.add('active'); }
            else if (path.startsWith('/manage') || path.startsWith('/edit_question')) { document.getElementById('nav-manage')?.classList.add('active'); }
            else if (path.startsWith('/admin/users')) { document.getElementById('nav-admin')?.classList.add('active'); }
        });
    </script>

    <!-- === LINGOMODAL CORE ENGINE === -->
    <style>
        .lingo-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .lingo-modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .lingo-modal {
            background: var(--card);
            border: 2px solid var(--border-color, rgba(0, 0, 0, 0.1));
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text);
            box-sizing: border-box;
        }

        .lingo-modal-overlay.active .lingo-modal {
            transform: scale(1) translateY(0);
        }

        .lingo-modal-header {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--primary, #1CB0F6);
        }

        .lingo-modal-body {
            font-size: 1.05rem;
            margin-bottom: 2rem;
            line-height: 1.5;
            color: var(--text, #4B4B4B);
        }

        .lingo-modal-input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            font-size: 1rem;
            margin-top: 1rem;
            box-sizing: border-box;
            background: var(--bg, #fff);
            color: var(--text);
        }

        .lingo-modal-input:focus {
            outline: none;
            border-color: var(--primary, #1CB0F6);
            box-shadow: 0 0 0 3px rgba(28, 176, 246, 0.2);
        }

        .lingo-modal-footer {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        /* Overriding .btn specifically for the modal to ensure exact layout */
        .lingo-modal-btn {
            padding: 0.7rem 1.4rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lingo-btn-cancel {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text, #4B4B4B);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.1);
        }

        .lingo-btn-cancel:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .lingo-btn-confirm {
            background: var(--primary, #1CB0F6);
            color: white;
            box-shadow: 0 4px 0 var(--secondary-shadow, #1899d6);
        }

        .lingo-btn-confirm:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .lingo-btn-danger {
            background: var(--danger, #FF4B4B);
            color: white;
            box-shadow: 0 4px 0 var(--danger-shadow, #ea2b2b);
        }

        .lingo-btn-danger:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>

    <div class="lingo-modal-overlay" id="lingoModalOverlay">
        <div class="lingo-modal">
            <div class="lingo-modal-header" id="lingoModalTitle">Title</div>
            <div class="lingo-modal-body">
                <span id="lingoModalMessage">Message</span>
                <input type="text" id="lingoModalInput" class="lingo-modal-input" style="display:none;" />
            </div>
            <div class="lingo-modal-footer">
                <button class="lingo-modal-btn lingo-btn-cancel" id="lingoModalCancelBtn">取消 (Cancel)</button>
                <button class="lingo-modal-btn lingo-btn-confirm" id="lingoModalConfirmBtn">确定 (OK)</button>
            </div>
        </div>
    </div>

    <script>
        const LingoModal = {
            _overlay: document.getElementById('lingoModalOverlay'),
            _title: document.getElementById('lingoModalTitle'),
            _message: document.getElementById('lingoModalMessage'),
            _input: document.getElementById('lingoModalInput'),
            _cancelBtn: document.getElementById('lingoModalCancelBtn'),
            _confirmBtn: document.getElementById('lingoModalConfirmBtn'),
            _resolve: null,

            _close() {
                this._overlay.classList.remove('active');
            },

            _open(title, message, isPrompt, isDanger, defaultInputValue = '') {
                this._title.innerText = title;
                this._message.innerText = message;

                if (isPrompt) {
                    this._input.style.display = 'block';
                    this._input.value = defaultInputValue;
                    this._input.focus();
                } else {
                    this._input.style.display = 'none';
                    this._input.value = '';
                }

                // Styling
                this._title.style.color = isDanger ? 'var(--danger)' : 'var(--primary)';
                this._confirmBtn.className = isDanger ? 'lingo-modal-btn lingo-btn-danger' : 'lingo-modal-btn lingo-btn-confirm';

                this._overlay.classList.add('active');

                return new Promise(resolve => {
                    this._resolve = resolve;

                    // Cleanup old listeners to prevent multiple triggers
                    const newCancel = this._cancelBtn.cloneNode(true);
                    const newConfirm = this._confirmBtn.cloneNode(true);
                    this._cancelBtn.replaceWith(newCancel);
                    this._confirmBtn.replaceWith(newConfirm);
                    this._cancelBtn = newCancel;
                    this._confirmBtn = newConfirm;

                    this._cancelBtn.onclick = () => {
                        this._close();
                        this._resolve(null);
                    };

                    this._confirmBtn.onclick = () => {
                        this._close();
                        if (isPrompt) {
                            this._resolve(this._input.value);
                        } else {
                            this._resolve(true);
                        }
                    };
                });
            },

            alert(title, message) {
                this._cancelBtn.style.display = 'none';
                return this._open(title, message, false, false).then(() => {
                    this._cancelBtn.style.display = 'block'; // reset
                });
            },

            confirm(title, message, isDanger = false) {
                this._cancelBtn.style.display = 'block';
                return this._open(title, message, false, isDanger);
            },

            prompt(title, message, defaultValue = '') {
                this._cancelBtn.style.display = 'block';
                return this._open(title, message, true, false, defaultValue);
            }
        };
    </script>
</body>
