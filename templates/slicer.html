{% extends "base.html" %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem">
    <div>
        <h1 style="margin:0"><i class="fas fa-scissors"></i> PDF 智能切题</h1>
        <p style="color:#636e72; margin:0.3rem 0 0 0">通过框选 PDF 页面内容快速生成题目图片</p>
    </div>
    <div style="display:flex; gap:1rem">
        <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="uploadPDF()">
        <button class="btn btn-primary" onclick="document.getElementById('pdf-input').click()"><i
                class="fas fa-upload"></i> 上传新 PDF</button>
    </div>
</div>

<div style="display:grid; grid-template-columns: 1fr 350px; gap:2rem; height: calc(100vh - 200px)">
    <!-- Main View: PDF Canvas -->
    <div class="glass-card" style="position:relative; overflow:auto; display:flex; flex-direction:column; padding:0">
        <div
            style="padding:1rem; background:rgba(0,0,0,0.02); display:flex; justify-content:center; align-items:center; gap:2rem; border-bottom:1px solid rgba(0,0,0,0.05)">
            <button class="btn btn-icon" onclick="changePage(-1)"><i class="fas fa-arrow-left"></i></button>
            <span id="page-info" style="font-weight:600">第 0 / 0 页</span>
            <button class="btn btn-icon" onclick="changePage(1)"><i class="fas fa-arrow-right"></i></button>
        </div>
        <div id="canvas-container"
            style="flex:1; position:relative; background:#888; display:flex; justify-content:center; overflow:auto">
            <canvas id="slicer-canvas"
                style="cursor:crosshair; box-shadow:0 0 40px rgba(0,0,0,0.3); margin:2rem; max-width: 90%; height: auto;"></canvas>
            <div id="selection-box"
                style="position:absolute; border:2px dashed #00b894; background:rgba(0,184,148,0.1); display:none; pointer-events:none">
            </div>
        </div>
    </div>

    <!-- Sidebar: Settings & Save -->
    <div class="glass-card" style="display:flex; flex-direction:column; gap:1.5rem">
        <h3 style="margin:0">切块属性</h3>

        <div class="form-group"
            style="background: rgba(108, 92, 231, 0.05); padding: 1rem; border-radius: 8px; border: 1px dashed rgba(108, 92, 231, 0.4);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
                <label style="color: var(--accent); font-weight: 600; margin: 0;"><i class="fas fa-magic"></i> AI 智能解析
                    (快捷导入)</label>
                <button type="button" class="btn btn-primary" onclick="smartParse()"
                    style="padding: 0.3rem 0.8rem; font-size: 0.8rem; box-shadow: none;">
                    <i class="fas fa-bolt"></i> 一键解析填入
                </button>
            </div>
            <textarea id="smart-import-text" rows="4" placeholder="将 AI 生成的带 [题干] [A] [解析] 等标签的文本粘贴于此..."
                style="font-family: monospace; font-size: 0.85rem; background: rgba(255, 255, 255, 0.7); margin-bottom: 0;"></textarea>
        </div>

        <div class="form-group">
            <label>所属学科</label>
            <select id="sid">
                {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>归属试卷 (可选)</label>
            <select id="pid">
                <option value="">-- 题库池 (不归属试卷) --</option>
                {% for p in papers %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>
        <hr style="opacity:0.1; margin:0">
        <div class="form-group">
            <label>题目备注/题干文本</label>
            <textarea id="qtext" rows="3" placeholder="可选：在此输入题干文本，支持多行"></textarea>
        </div>
        <div class="form-group">
            <label>题目类型</label>
            <select id="qtype" onchange="toggleOptions()">
                <option value="objective">单选题</option>
                <option value="multi">多选题</option>
                <option value="fill">填空题</option>
                <option value="subjective" selected>主观题/大题</option>
            </select>
        </div>

        <!-- Options Section -->
        <div id="options-grid"
            style="display:none; grid-template-columns:1fr 1fr; gap:0.8rem; background:rgba(0,0,0,0.02); padding:1rem; border-radius:10px;">
            <div class="form-group" style="margin:0">
                <label style="font-size:0.8rem">选项 A</label>
                <input type="text" id="opt-a" style="padding:0.5rem">
            </div>
            <div class="form-group" style="margin:0">
                <label style="font-size:0.8rem">选项 B</label>
                <input type="text" id="opt-b" style="padding:0.5rem">
            </div>
            <div class="form-group" style="margin:0">
                <label style="font-size:0.8rem">选项 C</label>
                <input type="text" id="opt-c" style="padding:0.5rem">
            </div>
            <div class="form-group" style="margin:0">
                <label style="font-size:0.8rem">选项 D</label>
                <input type="text" id="opt-d" style="padding:0.5rem">
            </div>
        </div>

        <div class="form-group">
            <label>正确答案</label>
            <input type="text" id="qans" placeholder="单选填A/B/C/D，多选填ABCD">
        </div>

        <div class="form-group">
            <label>解析文本 (可选)</label>
            <textarea id="analysis" rows="3" placeholder="在此输入题目解析及讲解过程..."></textarea>
        </div>

        <div class="form-group">
            <label>答案解析图 (可选)</label>
            <input type="file" id="ans-img" accept="image/*" style="font-size:0.9rem">
            <p style="font-size:0.8rem; color:#999; margin:0.3rem 0 0 0">可上传手写答案或详细解析图</p>
        </div>

        <div class="form-group"
            style="background: rgba(var(--accent-rgb), 0.05); padding: 1rem; border-radius: 8px; border: 1px dashed rgba(var(--accent-rgb), 0.2);">
            <label style="color: var(--accent-color); font-size: 0.85rem; font-weight: 600;"><i
                    class="fas fa-video"></i> 视频讲解 (可选)</label>
            <div style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem;">
                <input type="file" id="v-file" accept="video/*" style="font-size: 0.8rem;">
                <input type="text" id="v-url" placeholder="外部链接 (B站/URL)" style="font-size: 0.8rem; padding: 0.4rem;">
            </div>
        </div>

        <div class="form-group">
            <label>来源备注</label>
            <input type="text" id="qsource" placeholder="例: XX试卷第5题">
        </div>

        <div class="form-group">
            <label>适用年级 (可选)</label>
            <select id="qgrade" style="background: rgba(255,255,255,0.8); font-size: 0.85rem; padding: 0.6rem;">
                <option value="" {% if not request.cookies.get('active_grade') %}selected{% endif %}>🌍 默认无年级</option>
                <option value="一年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='一年级上' %}selected{% endif
                    %}>🎒 一年级上</option>
                <option value="一年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='一年级下' %}selected{% endif
                    %}>🎒 一年级下</option>
                <option value="二年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='二年级上' %}selected{% endif
                    %}>🎒 二年级上</option>
                <option value="二年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='二年级下' %}selected{% endif
                    %}>🎒 二年级下</option>
                <option value="三年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='三年级上' %}selected{% endif
                    %}>🎒 三年级上</option>
                <option value="三年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='三年级下' %}selected{% endif
                    %}>🎒 三年级下</option>
                <option value="四年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='四年级上' %}selected{% endif
                    %}>🎒 四年级上</option>
                <option value="四年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='四年级下' %}selected{% endif
                    %}>🎒 四年级下</option>
                <option value="五年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='五年级上' %}selected{% endif
                    %}>🎒 五年级上</option>
                <option value="五年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='五年级下' %}selected{% endif
                    %}>🎒 五年级下</option>
                <option value="六年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级上' %}selected{% endif
                    %}>🎒 六年级上</option>
                <option value="六年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级下' %}selected{% endif
                    %}>🎒 六年级下</option>
                <option value="初一上" {% if unquote(request.cookies.get('active_grade', '' ))=='初一上' %}selected{% endif
                    %}>📚 初一上</option>
                <option value="初一下" {% if unquote(request.cookies.get('active_grade', '' ))=='初一下' %}selected{% endif
                    %}>📚 初一下</option>
                <option value="初二上" {% if unquote(request.cookies.get('active_grade', '' ))=='初二上' %}selected{% endif
                    %}>📚 初二上</option>
                <option value="初二下" {% if unquote(request.cookies.get('active_grade', '' ))=='初二下' %}selected{% endif
                    %}>📚 初二下</option>
                <option value="初三上" {% if unquote(request.cookies.get('active_grade', '' ))=='初三上' %}selected{% endif
                    %}>🔥 初三上</option>
                <option value="初三下" {% if unquote(request.cookies.get('active_grade', '' ))=='初三下' %}selected{% endif
                    %}>🔥 初三下</option>
                <option value="高一上" {% if unquote(request.cookies.get('active_grade', '' ))=='高一上' %}selected{% endif
                    %}>📘 高一上</option>
                <option value="高一下" {% if unquote(request.cookies.get('active_grade', '' ))=='高一下' %}selected{% endif
                    %}>📘 高一下</option>
                <option value="高二上" {% if unquote(request.cookies.get('active_grade', '' ))=='高二上' %}selected{% endif
                    %}>📘 高二上</option>
                <option value="高二下" {% if unquote(request.cookies.get('active_grade', '' ))=='高二下' %}selected{% endif
                    %}>📘 高二下</option>
                <option value="高三上" {% if unquote(request.cookies.get('active_grade', '' ))=='高三上' %}selected{% endif
                    %}>🚀 高三上</option>
                <option value="高三下" {% if unquote(request.cookies.get('active_grade', '' ))=='高三下' %}selected{% endif
                    %}>🚀 高三下</option>
            </select>
        </div>

        <div style="margin-top:auto">
            <button id="save-btn" class="btn btn-primary" style="width:100%; justify-content:center; padding:1rem"
                onclick="saveSlice()" disabled>
                <i class="fas fa-save"></i> 保存切块并入库
            </button>
            <p style="font-size:0.75rem; color:#999; text-align:center; margin-top:0.8rem">
                提示：在左侧区域按住鼠标左键并拖动进行框选
            </p>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('slicer-canvas');
    const ctx = canvas.getContext('2d');
    const box = document.getElementById('selection-box');
    const container = document.getElementById('canvas-container');

    let isDrawing = false;
    let startX, startY;
    let currentRect = null;
    let currentPage = 1;
    let totalPages = 0;
    let originalWidth, originalHeight;

    async function uploadPDF() {
        const file = document.getElementById('pdf-input').files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('page', 1);

        showToast("正在加载 PDF...", true);
        const res = await fetch('/api/slice-upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.img) {
            totalPages = data.total;
            currentPage = 1;
            renderPage(data.img);
        }
    }

    async function changePage(dir) {
        if (currentPage + dir < 1 || currentPage + dir > totalPages) return;
        currentPage += dir;
        const formData = new FormData();
        formData.append('page', currentPage);
        const res = await fetch('/api/slice-upload', { method: 'POST', body: formData });
        const data = await res.json();
        renderPage(data.img);
        currentRect = null;
        box.style.display = 'none';
        document.getElementById('save-btn').disabled = true;
    }

    function renderPage(base64) {
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            originalWidth = img.width;
            originalHeight = img.height;

            // Fix: the canvas CSS max-width scales it down visually.
            // We need to know the rendered width/height later to map coordinates.
            ctx.drawImage(img, 0, 0);
            document.getElementById('page-info').innerText = `第 ${currentPage} / ${totalPages} 页`;
        };
        img.src = base64;
    }

    canvas.addEventListener('mousedown', e => {
        isDrawing = true;
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        box.style.display = 'block';
    });

    canvas.addEventListener('mousemove', e => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        // We need to map the visual coordinates back to actual canvas pixel coordinates.
        // Because canvas has max-width: 90%, its clientWidth might be smaller than canvas.width
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        let sX_scaled = startX * scaleX;
        let sY_scaled = startY * scaleY;

        const left = Math.min(sX_scaled, x);
        const top = Math.min(sY_scaled, y);
        const width = Math.abs(sX_scaled - x);
        const height = Math.abs(sY_scaled - y);

        currentRect = { left, top, width, height };

        // Drawing the visual box (unscaled)
        const visLeft = Math.min(startX, e.clientX - rect.left);
        const visTop = Math.min(startY, e.clientY - rect.top);
        const visWidth = Math.abs(startX - (e.clientX - rect.left));
        const visHeight = Math.abs(startY - (e.clientY - rect.top));

        box.style.left = (visLeft + canvas.offsetLeft) + 'px';
        box.style.top = (visTop + canvas.offsetTop) + 'px';
        box.style.width = visWidth + 'px';
        box.style.height = visHeight + 'px';
    });

    canvas.addEventListener('mouseup', () => {
        isDrawing = false;
        if (currentRect && currentRect.width > 10 && currentRect.height > 10) {
            document.getElementById('save-btn').disabled = false;
        }
    });

    function toggleOptions() {
        const type = document.getElementById('qtype').value;
        const grid = document.getElementById('options-grid');
        grid.style.display = (type === 'objective' || type === 'multi') ? 'grid' : 'none';
    }

    function smartParse() {
        const text = document.getElementById('smart-import-text').value;
        if (!text.trim()) return showToast("请输入需要解析的文本", false);

        const extract = (tags) => {
            for (let tag of tags) {
                const regex = new RegExp(`(?:\\[|【)${tag}(?:\\]|】)[\\s\\S]*?(?=(?:\\[|【)[^\\]】]+(?:\\]|】)|$)`, 'i');
                const match = text.match(regex);
                if (match) {
                    return match[0].replace(new RegExp(`(?:\\[|【)${tag}(?:\\]|】)\\s*`, 'i'), '').trim();
                }
            }
            return null;
        };

        const qText = extract(['题目', '题干', '问题']);
        const type = extract(['题型', '类型']);
        const optA = extract(['A', '选项A']);
        const optB = extract(['B', '选项B']);
        const optC = extract(['C', '选项C']);
        const optD = extract(['D', '选项D']);
        const ans = extract(['答案', '正确答案', '标准答案']);
        const analysis = extract(['解析', '解答', '讲解']);

        let filledFields = 0;

        if (qText) { document.getElementById('qtext').value = qText; filledFields++; }

        let qTypeValue = 'subjective';
        if (type) {
            if (type.includes('单选')) qTypeValue = 'objective';
            else if (type.includes('多选')) qTypeValue = 'multi';
            else if (type.includes('填空')) qTypeValue = 'fill';
            else if (type.includes('解答') || type.includes('主观')) qTypeValue = 'subjective';
        } else if (optA && optB && optC && optD) {
            if (ans && ans.length > 1 && /^[A-D]+$/i.test(ans)) {
                qTypeValue = 'multi';
            } else {
                qTypeValue = 'objective';
            }
        }

        const typeSelect = document.getElementById('qtype');
        if (typeSelect.value !== qTypeValue) {
            typeSelect.value = qTypeValue;
            toggleOptions();
        }

        if (optA) { document.getElementById('opt-a').value = optA; filledFields++; }
        if (optB) { document.getElementById('opt-b').value = optB; filledFields++; }
        if (optC) { document.getElementById('opt-c').value = optC; filledFields++; }
        if (optD) { document.getElementById('opt-d').value = optD; filledFields++; }
        if (ans) { document.getElementById('qans').value = ans; filledFields++; }
        if (analysis) { document.getElementById('analysis').value = analysis; filledFields++; }

        if (filledFields > 0) {
            showToast(`✅ 成功识别并填入 ${filledFields} 项内容`, true);
        } else {
            showToast("⚠️ 未能识别出预设标签，请检查格式", false);
        }
    }

    async function saveSlice() {
        if (!currentRect) return;
        const saveBtn = document.getElementById('save-btn');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传并保存中...';

        const formData = new FormData();
        formData.append('sid', document.getElementById('sid').value);

        const pidVal = document.getElementById('pid').value;
        if (pidVal) formData.append('pid', pidVal);

        formData.append('text', document.getElementById('qtext').value);
        formData.append('type', document.getElementById('qtype').value);

        const aVal = document.getElementById('opt-a').value; if (aVal) formData.append('a', aVal);
        const bVal = document.getElementById('opt-b').value; if (bVal) formData.append('b', bVal);
        const cVal = document.getElementById('opt-c').value; if (cVal) formData.append('c', cVal);
        const dVal = document.getElementById('opt-d').value; if (dVal) formData.append('d', dVal);
        formData.append('ans', document.getElementById('qans').value);

        const analysisVal = document.getElementById('analysis').value;
        if (analysisVal) formData.append('analysis', analysisVal);
        formData.append('source', document.getElementById('qsource').value);

        const grdVal = document.getElementById('qgrade').value;
        if (grdVal) formData.append('grade', grdVal);

        // JSON stringify complex objects for FormData
        formData.append('rect', JSON.stringify(currentRect));
        formData.append('canvas_w', canvas.width);
        formData.append('canvas_h', canvas.height);
        formData.append('page', currentPage);

        const fileInput = document.getElementById('ans-img');
        if (fileInput.files[0]) {
            formData.append('answer_image', fileInput.files[0]);
        }

        const vidFile = document.getElementById('v-file');
        if (vidFile.files[0]) {
            formData.append('v_file', vidFile.files[0]);
        }
        const vUrlVal = document.getElementById('v-url').value;
        if (vUrlVal) formData.append('v_url', vUrlVal);

        const res = await fetch('/api/slice-save', {
            method: 'POST',
            body: formData
        });

        if (res.ok) {
            showToast("✅ 切块已入库！", true);
            box.style.display = 'none';
            currentRect = null;
            // Clear inputs
            document.getElementById('qtext').value = '';
            document.getElementById('qans').value = '';
            document.getElementById('analysis').value = '';
            document.getElementById('ans-img').value = '';
            document.getElementById('v-file').value = '';
            document.getElementById('v-url').value = '';
            document.getElementById('smart-import-text').value = '';
            document.querySelectorAll('#options-grid input').forEach(i => i.value = '');
        } else {
            showToast("❌ 保存失败", false);
        }

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<i class="fas fa-save"></i> 保存切块并入库';
    }
</script>
{% endblock %}
