{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto; padding: 2.5rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="margin: 0;"><i class="fas fa-plus-circle"></i> 录入新题目 - {{ subject.name }}</h2>
        <a href="/subject/{{ subject.id }}" class="btn"><i class="fas fa-arrow-left"></i> 返回</a>
    </div>

    <form action="/subject/{{ subject.id }}/add" method="POST" enctype="multipart/form-data" id="add-form">
        <!-- Smart Parse Section -->
        <div
            style="background: rgba(108, 92, 231, 0.05); padding: 1.5rem; border-radius: 15px; border: 1px dashed rgba(108, 92, 231, 0.4); margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <label style="color: var(--accent); font-weight: 600; margin: 0; opacity: 1;"><i
                        class="fas fa-magic"></i> AI 智能解析 (快捷导入)</label>
                <button type="button" class="btn btn-primary" onclick="smartParse()"
                    style="padding: 0.4rem 1rem; font-size: 0.85rem; box-shadow: none;">
                    <i class="fas fa-hat-wizard"></i> 一键解析填入
                </button>
            </div>
            <textarea id="smart-import-text" rows="5" placeholder="将 AI 生成的题目整段粘贴于此，例如：
[题干] 设集合 $A=\\{1,2\\}$，则...
[A] 1
[B] 2
[答案] A" style="font-family: monospace; font-size: 0.9rem; background: rgba(255, 255, 255, 0.7);"></textarea>
        </div>
        <div class="form-group">
            <label>题目文本 (可选)</label>
            <textarea name="q_text" rows="4" placeholder="在此输入题目文字描述..."></textarea>
        </div>

        <div class="form-group">
            <label>所属知识板块/标签 (可选, 逗号分隔)</label>
            <input type="text" name="tags" placeholder="例: 几何, 函数, 必考题">
            <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.6;">知识板块将用于分类题目并展示在侧边栏。输入多个请用英文或中文逗号隔开。</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label>题目类型</label>
                <select name="q_type" id="q_type" onchange="toggleOptions()">
                    <option value="objective" selected>单选题</option>
                    <option value="multi">多选题</option>
                    <option value="true_false">判断题</option>
                    <option value="fill">填空题</option>
                    <option value="subjective">主观题/解答题</option>
                </select>
            </div>
            <div class="form-group">
                <label>标准答案</label>
                <div id="tf-options" style="display:none; gap:10px; margin-bottom:10px;">
                    <button type="button" class="btn" onclick="setTF('对')" style="background:rgba(0,184,148,0.1); color:var(--success); border:1px solid var(--success); flex:1">对 (√)</button>
                    <button type="button" class="btn" onclick="setTF('错')" style="background:rgba(214,48,49,0.1); color:var(--danger); border:1px solid var(--danger); flex:1">错 (×)</button>
                </div>
                <input type="text" name="ans" id="ans-input" placeholder="例: A 或 ABCD">
            </div>
        </div>

        <!-- Options Section -->
        <div id="options-section"
            style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; background: rgba(0,0,0,0.02); padding: 1.5rem; border-radius: 15px;">
            <div class="form-group" style="margin:0">
                <label>选项 A</label>
                <input type="text" name="a">
            </div>
            <div class="form-group" style="margin:0">
                <label>选项 B</label>
                <input type="text" name="b">
            </div>
            <div class="form-group" style="margin:0">
                <label>选项 C</label>
                <input type="text" name="c">
            </div>
            <div class="form-group" style="margin:0">
                <label>选项 D</label>
                <input type="text" name="d">
            </div>
        </div>

        <div class="form-group">
            <label>解析文本 (可选)</label>
            <textarea name="analysis" rows="3" placeholder="在此输入题目解析及讲解过程..."></textarea>
        </div>

        <div class="form-group">
            <label>题目图片 (支持多张)</label>
            <input type="file" name="q_images" multiple accept="image/*">
        </div>

        <div class="form-group">
            <label>解答/解析图片 (支持多张)</label>
            <input type="file" name="a_images" multiple accept="image/*">
        </div>
        <div class="form-group"
            style="background: rgba(var(--accent-rgb), 0.05); padding: 1.5rem; border-radius: 12px; border: 1px dashed rgba(var(--accent-rgb), 0.2);">
            <label style="color: var(--accent-color); font-weight: 600;"><i class="fas fa-video"></i> 视频讲解 (可选)</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                    <label style="font-size: 0.85rem; opacity: 0.8;">上传本地视频</label>
                    <input type="file" name="v_file" accept="video/*">
                </div>
                <div>
                    <label style="font-size: 0.85rem; opacity: 0.8;">外部视频链接 (B站/YouTube/URL)</label>
                    <input type="text" name="v_url" placeholder="https://...">
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>来源备注 (可选)</label>
            <input type="text" name="source" placeholder="例: 2023年期末考试第5题">
        </div>

        <div class="form-group">
            <label>适用年级 (可选)</label>
            <select name="grade" style="background: rgba(255,255,255,0.8);">
                <option value="" {% if not request.cookies.get('active_grade') %}selected{% endif %}>🌍 默认无年级</option>
                <option value="一年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='一年级上' %}selected{% endif
                    %}>🎒 一年级上</option>
                <option value="一年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='一年级下' %}selected{% endif
                    %}>🎒 一年级下</option>
                <option value="二年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='二年级上' %}selected{% endif
                    %}>🎒 二年级上</option>
                <option value="二年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='二年级下' %}selected{% endif
                    %}>🎒 二年级下</option>
                <option value="三年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='三年级上' %}selected{% endif
                    %}>🎒 三年级上</option>
                <option value="三年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='三年级下' %}selected{% endif
                    %}>🎒 三年级下</option>
                <option value="四年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='四年级上' %}selected{% endif
                    %}>🎒 四年级上</option>
                <option value="四年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='四年级下' %}selected{% endif
                    %}>🎒 四年级下</option>
                <option value="五年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='五年级上' %}selected{% endif
                    %}>🎒 五年级上</option>
                <option value="五年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='五年级下' %}selected{% endif
                    %}>🎒 五年级下</option>
                <option value="六年级上" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级上' %}selected{% endif
                    %}>🎒 六年级上</option>
                <option value="六年级下" {% if unquote(request.cookies.get('active_grade', '' ))=='六年级下' %}selected{% endif
                    %}>🎒 六年级下</option>
                <option value="初一上" {% if unquote(request.cookies.get('active_grade', '' ))=='初一上' %}selected{% endif
                    %}>📚 初一上</option>
                <option value="初一下" {% if unquote(request.cookies.get('active_grade', '' ))=='初一下' %}selected{% endif
                    %}>📚 初一下</option>
                <option value="初二上" {% if unquote(request.cookies.get('active_grade', '' ))=='初二上' %}selected{% endif
                    %}>📚 初二上</option>
                <option value="初二下" {% if unquote(request.cookies.get('active_grade', '' ))=='初二下' %}selected{% endif
                    %}>📚 初二下</option>
                <option value="初三上" {% if unquote(request.cookies.get('active_grade', '' ))=='初三上' %}selected{% endif
                    %}>🔥 初三上</option>
                <option value="初三下" {% if unquote(request.cookies.get('active_grade', '' ))=='初三下' %}selected{% endif
                    %}>🔥 初三下</option>
                <option value="高一上" {% if unquote(request.cookies.get('active_grade', '' ))=='高一上' %}selected{% endif
                    %}>📘 高一上</option>
                <option value="高一下" {% if unquote(request.cookies.get('active_grade', '' ))=='高一下' %}selected{% endif
                    %}>📘 高一下</option>
                <option value="高二上" {% if unquote(request.cookies.get('active_grade', '' ))=='高二上' %}selected{% endif
                    %}>📘 高二上</option>
                <option value="高二下" {% if unquote(request.cookies.get('active_grade', '' ))=='高二下' %}selected{% endif
                    %}>📘 高二下</option>
                <option value="高三上" {% if unquote(request.cookies.get('active_grade', '' ))=='高三上' %}selected{% endif
                    %}>🚀 高三上</option>
                <option value="高三下" {% if unquote(request.cookies.get('active_grade', '' ))=='高三下' %}selected{% endif
                    %}>🚀 高三下</option>
            </select>
        </div>

        <input type="hidden" name="paper_id"
            value="{{ request.query_params.get('paper_id') or request.query_params.get('pid', '') }}">

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; padding: 1rem; font-size: 1.1rem;">
                <i class="fas fa-save"></i> 立即保存并入库
            </button>
        </div>
    </form>
</div>

<script>
    document.getElementById('add-form').addEventListener('submit', function (e) {
        const pidInput = document.querySelector('input[name="paper_id"]');
        if (pidInput && !pidInput.value) {
            pidInput.removeAttribute('name');
        }
    });

    function toggleOptions() {
        const type = document.getElementById('q_type').value;
        const section = document.getElementById('options-section');
        const tfOptions = document.getElementById('tf-options');
        const ansInput = document.getElementById('ans-input');
        
        section.style.display = (type === 'objective' || type === 'multi') ? 'grid' : 'none';
        tfOptions.style.display = (type === 'true_false') ? 'flex' : 'none';
        
        if (type === 'true_false') {
            ansInput.placeholder = "填 '对' 或 '错'";
        } else {
            ansInput.placeholder = "例: A 或 ABCD";
        }
    }

    function setTF(val) {
        document.getElementById('ans-input').value = val;
    }

    function smartParse() {
        const textArea = document.getElementById('smart-import-text');
        const text = textArea.value;
        if (!text.trim()) {
            showToast('请先粘贴 AI 生成的题目文本再解析！', false);
            return;
        }

        // Helper to extract text block by tag name
        const extract = (tags) => {
            for (const tag of tags) {
                // Look for [tag] or 【tag】
                const regex = new RegExp(`(?:\\[|【)${tag}(?:\\]|】)([\\s\\S]*?)(?=(?:\\[|【)[^\\]】]+(?:\\]|】)|$)`, 'i');
                const match = text.match(regex);
                if (match && match[1].trim()) return match[1].trim();
            }
            return '';
        };

        const qText = extract(['题干', '题目', '问题']);
        const ans = extract(['答案', '正确答案', '标准答案']);
        const a = extract(['A', '选项A']);
        const b = extract(['B', '选项B']);
        const c = extract(['C', '选项C']);
        const d = extract(['D', '选项D']);
        const analysis = extract(['解析', '解答', '讲解']);

        let filledFields = 0;

        // Populate Form
        if (qText) {
            document.querySelector('textarea[name="q_text"]').value = qText;
            filledFields++;
        }

        if (analysis) {
            const analysisInput = document.querySelector('textarea[name="analysis"]');
            if (analysisInput) {
                analysisInput.value = analysis;
                filledFields++;
            }
        }

        if (ans) { document.querySelector('input[name="ans"]').value = ans; filledFields++; }
        if (a) { document.querySelector('input[name="a"]').value = a; filledFields++; }
        if (b) { document.querySelector('input[name="b"]').value = b; filledFields++; }
        if (c) { document.querySelector('input[name="c"]').value = c; filledFields++; }
        if (d) { document.querySelector('input[name="d"]').value = d; filledFields++; }

        // Determine Type
        const typeStr = extract(['题型', '类型']);
        const qTypeSelect = document.getElementById('q_type');
        if (typeStr) {
            if (typeStr.includes('单选')) qTypeSelect.value = 'objective';
            else if (typeStr.includes('多选')) qTypeSelect.value = 'multi';
            else if (typeStr.includes('判断')) qTypeSelect.value = 'true_false';
            else if (typeStr.includes('填空')) qTypeSelect.value = 'fill';
            else if (typeStr.includes('主观') || typeStr.includes('解答')) qTypeSelect.value = 'subjective';
            filledFields++;
        } else {
            // Auto guess
            if (ans && (ans === '对' || ans === '错' || ans === '正确' || ans === '错误' || ans === '√' || ans === '×')) {
                qTypeSelect.value = 'true_false';
            } else if (a || b || c || d) {
                qTypeSelect.value = (ans && ans.length > 1 && !ans.includes('选项')) ? 'multi' : 'objective';
            } else if (!qTypeSelect.value || qTypeSelect.value === 'objective') {
                qTypeSelect.value = 'subjective';
            }
        }

        // Refresh UI
        toggleOptions();

        if (filledFields > 0) {
            showToast('解析成功！请检查填入的内容。');
            // Optional: textArea.value = ''; // clear upon success? Leaving it might be better for manual adjustment
        } else {
            showToast('未检测到标准标签(如 [题干], [A], [答案] 等)，请检查格式。', false);
        }
    }

    // Init
    toggleOptions();
</script>
{% endblock %}
